<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal - Play Chess</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ========================
           CSS: Variables & Reset
           ======================== */
        :root {
            --bg-color: #0f0f13;
            --nav-bg: #1a1a24;
            --card-bg: #2a2a35;
            --primary-color: #8a2be2;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --border-radius: 12px;
            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* ========================
           CSS: Navbar
           ======================== */
        header {
            background-color: var(--nav-bg);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 20px;
            font-weight: 700;
        }

        .logo-area span {
            color: var(--primary-color);
        }

        .search-bar {
            flex: 1;
            margin: 0 15px;
            position: relative;
            max-width: 500px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 40px;
            border-radius: 20px;
            border: none;
            background-color: #2c2c3a;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .search-bar i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .nav-icons {
            display: flex;
            gap: 15px;
            font-size: 18px;
            color: var(--text-muted);
        }

        .nav-icons i {
            cursor: pointer;
            transition: color var(--transition-speed);
        }

        .nav-icons i:hover {
            color: var(--text-main);
        }

        /* ========================
           CSS: Main Content & Grid
           ======================== */
        main {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Category / Recently Played Row */
        .recent-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            scrollbar-width: none; /* Firefox */
        }
        .recent-row::-webkit-scrollbar {
            display: none; /* Chrome */
        }

        .surprise-btn {
            background-color: var(--primary-color);
            color: white;
            min-width: 80px;
            height: 80px;
            border-radius: var(--border-radius);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            border: none;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            transition: transform var(--transition-speed);
        }
        .surprise-btn:active {
            transform: scale(0.95);
        }

        .empty-slot {
            min-width: 80px;
            height: 80px;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #444;
        }

        /* Game Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        /* ========================
           CSS: Game Cards & Animations
           ======================== */
        .game-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            
            /* Initial state for animation */
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s forwards ease-out;
        }

        /* Delaying animations for a cascading effect */
        .game-card:nth-child(1) { animation-delay: 0.1s; }
        .game-card:nth-child(2) { animation-delay: 0.2s; }
        .game-card:nth-child(3) { animation-delay: 0.3s; }
        .game-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-card:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .game-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-bottom: 2px solid rgba(255,255,255,0.05);
        }

        .game-info {
            padding: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 100%);
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        .game-title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Featured Large Card setup */
        .featured-grid {
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        }
        
        .featured-card .game-img {
            height: 250px;
        }

        /* Mobile Responsive adjustments */
        @media (max-width: 600px) {
            .search-bar { display: none; } /* Hide search bar on very small screens for clean look */
            .game-grid { grid-template-columns: repeat(2, 1fr); }
            .featured-grid { grid-template-columns: repeat(2, 1fr); }
            .featured-card .game-img { height: 180px; }
        }
    </style>
</head>
<body>

    <!-- Header / Navigation Bar -->
    <header>
        <div class="logo-area">
            <i class="fa-solid fa-bars" style="color: white; margin-right: 10px; cursor:pointer;"></i>
            <div style="display:flex; align-items:center; gap:5px;">
                <i class="fa-solid fa-gamepad" style="color:var(--primary-color);"></i>
                <span>Play</span>Box
            </div>
        </div>
        
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search games...">
        </div>

        <div class="nav-icons">
            <i class="fa-regular fa-bell"></i>
            <i class="fa-regular fa-user"></i>
        </div>
    </header>

    <!-- Main Content Area -->
    <main>
        <!-- Recently Played Section -->
        <h2 class="section-title">Recently played</h2>
        <div class="recent-row">
            <button class="surprise-btn" onclick="surpriseMe()">
                <i class="fa-solid fa-shuffle" style="font-size: 24px; margin-bottom: 5px;"></i>
                Surprise<br>me!
            </button>
            <div class="empty-slot"><i class="fa-regular fa-clock"></i></div>
            <div class="empty-slot"><i class="fa-regular fa-clock"></i></div>
            <div class="empty-slot"><i class="fa-regular fa-clock"></i></div>
            <div class="empty-slot"><i class="fa-regular fa-clock"></i></div>
        </div>

        <!-- Top Picks Section (Where Chess is located) -->
        <h2 class="section-title" style="margin-top: 20px;">Top picks for you</h2>
        
        <div class="game-grid">
            
            <!-- 1. CHESS GAME CARD (Your requested game) -->
            <!-- Link provided by you -->
            <a href="https://onlinemultiplayer.github.io/Chess_org/" target="_self" class="game-card" onclick="showLoader(event, this.href)">
                <!-- Placeholder image mimicking your silver shield logo -->
                <img src="https://images.unsplash.com/photo-1529699211952-734e80c4d42b?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Chess Free" class="game-img">
                <div class="game-info">
                    <div class="game-title">Chess Pro</div>
                </div>
            </a>

            <!-- Dummy Game 2 -->
            <a href="#" class="game-card">
                <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Game" class="game-img">
                <div class="game-info">
                    <div class="game-title">Billiards Classic</div>
                </div>
            </a>

            <!-- Dummy Game 3 -->
            <a href="#" class="game-card">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Game" class="game-img">
                <div class="game-info">
                    <div class="game-title">Action Strike</div>
                </div>
            </a>

            <!-- Dummy Game 4 -->
            <a href="#" class="game-card">
                <img src="https://images.unsplash.com/photo-1611996575749-79a3a250f563?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Game" class="game-img">
                <div class="game-info">
                    <div class="game-title">Space Shooter</div>
                </div>
            </a>

        </div>

    </main>

    <!-- JavaScript for Interactivity -->
    <script>
        // Function for "Surprise Me" button
        function surpriseMe() {
            alert("Fetching a random game for you... (Demo feature)");
        }

        // Optional: Smooth transition effect before opening game link
        function showLoader(event, url) {
            // Prevent default instant click if you want to show an animation first
            // event.preventDefault(); 
            
            // You can add logic here to show a full screen loading spinner
            console.log("Opening game: " + url);
            
            // For now, it opens natively without delay as requested for best mobile UX.
        }

        // Search bar interaction (adds a glowing shadow when typing)
        const searchInput = document.querySelector('.search-bar input');
        if(searchInput) {
            searchInput.addEventListener('focus', () => {
                searchInput.style.boxShadow = '0 0 10px #8a2be2';
            });
            searchInput.addEventListener('blur', () => {
                searchInput.style.boxShadow = 'none';
            });
        }
    </script>
</body>
</html>
